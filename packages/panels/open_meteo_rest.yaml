rest:
  - resource: >-
      https://api.open-meteo.com/v1/forecast?latitude=56.45964946031108&longitude=13.633502826328698&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m,precipitation,wind_gusts_10m&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant&forecast_days=4&wind_speed_unit=kmh
    scan_interval: 600
    timeout: 15
    sensor:
      - name: "Open-Meteo Raw Weather"
        unique_id: open_meteo_raw_weather
        value_template: "{{ value_json.current.time }}"
        json_attributes:
          - current
          - current_units
          - hourly
          - hourly_units
          - daily
          - daily_units
