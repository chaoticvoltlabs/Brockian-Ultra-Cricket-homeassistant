template:
  - sensor:
      - name: "Panel Office Temperature"
        unique_id: panel_office_temperature
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set v = states('sensor.example_office_temperature') %}
          {{ v | float if is_number(v) else none }}

      - name: "Panel Office Humidity"
        unique_id: panel_office_humidity
        unit_of_measurement: "%"
        device_class: humidity
